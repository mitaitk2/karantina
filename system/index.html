<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Karantina Sunucu Durumu</title>
    <style>
        /* Sitenin havasına uygun karanlık tema */
        .discord-card {
            background: #2f3136;
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            font-family: 'Segoe UI', sans-serif;
            border: 2px solid #5865f2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #3ba55c;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .count { font-weight: bold; color: #5865f2; }
        .btn-join {
            display: block;
            text-align: center;
            background: #5865f2;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-join:hover { background: #4752c4; }
    </style>
</head>
<body>

<div class="discord-card">
    <h2 id="server-name">Yükleniyor...</h2>
    <p><span class="status-dot"></span> Aktif Üye: <span id="online-count" class="count">0</span></p>
    <p>👥 Toplam Üye: <span id="total-count" class="count">Bilinmiyor</span></p>
    <a href="discord.gg/karantina" target="_blank" class="btn-join">Discord Sunucusuna Katıl</a>
</div>

<script>
    // SUNUCU_ID yazan yere Discord sunucunun ID'sini yaz kanka
    const serverID = "SUNUCU_ID"; 

    fetch(`https://discord.com/api/guilds/${serverID}/widget.json`)
    .then(response => response.json())
    .then(data => {
        document.getElementById('server-name').innerText = data.name;
        document.getElementById('online-count').innerText = data.presence_count;
        // Not: Widget API anlık aktifleri verir, toplam üye için bot veya manuel girmek gerekir.
    })
    .catch(err => console.error("Veri çekilemedi kanka, Widget kapalı olabilir!"));
</script>

</body>
</html>
